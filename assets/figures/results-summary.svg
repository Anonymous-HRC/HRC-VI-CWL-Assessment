    <text x="250" y="400" text-anchor="middle" font-size="14" fill="#52525b">Replace with manuscript-consistent quantitative validation.</text>
    <text x="670" y="400" text-anchor="middle" font-size="14" fill="#52525b">Replace with condition-level analysis and error bars.</text>
