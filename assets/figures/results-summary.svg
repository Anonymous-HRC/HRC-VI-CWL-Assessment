    <rect x="70" y="95" width="360" height="275" rx="18" fill="#ffffff"/>
    <rect x="490" y="95" width="360" height="275" rx="18" fill="#ffffff"/>
    <text x="250" y="130" text-anchor="middle" font-size="17" font-weight="700" fill="#27272a">Workload validation</text>
    <text x="670" y="130" text-anchor="middle" font-size="17" font-weight="700" fill="#27272a">Condition comparison</text>
    <g stroke="#a1a1aa" stroke-width="2">
      <path d="M120 310h260M120 170v140"/>
