<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" role="img" aria-labelledby="title desc">
  <title id="title">Results summary</title>
  <desc id="desc">Placeholder validation and comparison charts for cognitive workload assessment.</desc>
  <rect width="920" height="440" rx="24" fill="#f4f4f5"/>
  <g font-family="Arial, sans-serif">
